# ============================================================
# fetch_kline.py 配置文件
# ============================================================

# 抓取最近几年的数据（默认6年，2019年至今）
years: 3

# 股票清单 CSV 路径（需含 ts_code 与 symbol 列）
stocklist: "./pipeline/stocklist.csv"

# 排除板块，可选值：
#   gem  — 创业板（300/301 开头，后缀 .SZ）
#   star — 科创板（688 开头，后缀 .SH）
#   bj   — 北交所（4/8 开头，后缀 .BJ）
# 如需全部保留，设为空列表 []
exclude_boards:
  - gem
  - star
  - bj

# K线数据输出目录
out: "./data/raw"

# 并发下载线程数（AKShare 有频率限制，建议 3～5）
workers: 3
